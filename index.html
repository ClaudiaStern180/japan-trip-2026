  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {

  #app { max-width: 720px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  /* ---- Top bar ---- */
  #topbar {
    background: var(--navy);
    color: var(--cream);
    padding: 16px 18px 0;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  #topbar .brand {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  #topbar .brand h1 {
    font-size: 17px;
    margin: 0;
    font-weight: 700;
    letter-spacing: 0.2px;
  }
  #topbar .brand .sub {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.6px;
    text-transform: uppercase;
  }
  #tabs {
    display: flex;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  #tabs::-webkit-scrollbar { display: none; }
  #tabs button {
    flex: 0 0 auto;
    background: transparent;
    border: none;
    color: rgba(247,243,234,0.55);
    font-size: 13px;
    font-weight: 600;
    padding: 10px 10px 12px;
    position: relative;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
  }
  #tabs button.active { color: var(--cream); }
  #tabs button.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 10%; right: 10%;
    height: 3px;
    background: var(--gold);
    border-radius: 2px 2px 0 0;
  }

  .city-header {
    padding: 16px 18px 12px;
  }
  .city-header .emoji { font-size: 26px; }
  .city-header h2 {
    margin: 6px 0 2px;
    font-size: 21px;
    font-weight: 800;
    color: var(--navy);
  }
  .city-header p {
    margin: 0;
    font-size: 12.5px;
    color: var(--muted);
  }

  .leaflet-map { width: 100%; height: 340px; background: #e8e4d8; }
  .map-legend {
    position: absolute; z-index: 500; top: 8px; right: 8px;
    background: rgba(255,255,255,0.94);
    border-radius: 8px; padding: 7px 9px; font-size: 10px; line-height: 1.35;
    max-width: 150px; box-shadow: 0 1px 6px rgba(0,0,0,0.25);

  .map-legend .li { display: flex; align-items: center; gap: 5px; padding: 1px 0; }
  .map-legend .n {
    width: 13px; height: 13px; border-radius: 50%; color: white;
    font-size: 8.5px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0;

  .map-legend .div { height: 1px; background: rgba(0,0,0,0.12); margin: 4px 0; }
  .map-note {
    padding: 6px 18px 14px; font-size: 11px; color: var(--muted); text-align: center;
  }

  .section-title {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px;

  .section-title .count {
    background: var(--line); color: var(--navy); border-radius: 20px;
    font-size: 10.5px; padding: 1px 8px; font-weight: 700;

    background: var(--paper);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    box-shadow: 0 1px 3px rgba(27,42,65,0.08);

  .card .title { font-size: 14.5px; font-weight: 700; color: var(--ink); margin: 0 0 2px; }
  .card .meta { font-size: 12px; color: var(--muted); line-height: 1.45; }

  .card .tag {

    margin: 14px 0 8px; padding-bottom: 5px; border-bottom: 2px solid var(--line);

    padding: 22px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 12.5px;
  }
  .tickets-empty .icon { font-size: 26px; margin-bottom: 6px; }

  .upload-box {
    border: 1.5px dashed var(--line);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    background: var(--paper);

    background: var(--navy);

    font-weight: 700;

    border-radius: 20px;

  .upload-hint { font-size: 11px; color: var(--muted); margin-top: 8px; }

  .file-card {

    margin-bottom: 7px;

  .file-card a.fdownload {

const COLOR_FOOD = '#8B3A62';

/* ============ RENDER ============ */
const content = document.getElementById('content');
const maps = {}; // leaflet instances cache

function tagColor(tag) {
  const map = { CHANKO: '#8B3A62', FRÜHSTÜCK: '#B8860B', PONTOCHO: '#8B3A62', GION: '#8B3A62',
                MARKT: '#8B3A62', STATION: '#8B3A62', TAKOYAKI: '#8B3A62', OKONOMIYAKI: '#8B3A62',
                RAMEN: '#8B3A62', KRABBE: '#8B3A62' };
  return map[tag] || '#8B3A62';
}

function buildPanel(cityKey, city) {
  const panel = document.createElement('div');
  panel.className = 'city-panel';
  panel.id = 'panel-' + cityKey;

  const allDayItems = city.dayGroups.flatMap(g => g.items.map(i => ({...i, color: g.color})));
  const allHotelItems = city.hotels.map(h => ({...h, color: COLOR_HOTEL}));
  const allFoodItems = city.food.map(f => ({...f, color: COLOR_FOOD}));
  const allPoints = [...allHotelItems, ...allDayItems, ...allFoodItems];

  const legendRows = allPoints.map(p => {
    const c = p.color.startsWith('var') ? getComputedColor(p.color) : p.color;
    return `<div class="li"><span class="n" style="background:${c}">${p.num}</span>${p.title}</div>`;
  }).join('');

  panel.innerHTML = `
    <div class="city-header">
      <span class="emoji">${city.emoji}</span>
      <h2>${city.label} · ${city.dates}</h2>
      <p>Hotels, Sehenswürdigkeiten & Restaurants auf einen Blick</p>
    </div>
    <div class="map-wrap">
      <div class="leaflet-map" id="map-${cityKey}"></div>
      <div class="map-legend">${legendRows}</div>
    </div>
    <div class="map-note">Antippen für Details · Karte lädt über echte Server-Verbindung</div>

    <div class="section">
      <div class="section-title">🏨 Hotels <span class="count">${city.hotels.length}</span></div>
      ${city.hotels.map(h => cardHTML(h, COLOR_HOTEL)).join('')}
    </div>

    <div class="section">
      <div class="section-title">📍 Sehenswürdigkeiten <span class="count">${allDayItems.length}</span></div>
      ${city.dayGroups.map(g => `
        <div class="day-divider">${g.label}</div>
        ${g.items.map(i => cardHTML(i, getComputedColor(g.color))).join('')}
      `).join('')}
    </div>

    <div class="section">
      <div class="section-title">🍽️ Restaurants <span class="count">${city.food.length}</span></div>
      ${city.food.map(f => cardHTML(f, COLOR_FOOD, true)).join('')}
    </div>

    <div class="section">
      <div class="section-title">🎫 Tickets & Dokumente</div>
      ${uploadWidgetHTML(cityKey, 'Dokument')}
    </div>
  `;

  content.appendChild(panel);

  // store point data for map init
  panel._points = allPoints;
  panel._city = city;
  initUploadWidgets(cityKey);
}

function getComputedColor(cssVar) {
  if (!cssVar.startsWith('var')) return cssVar;
  const name = cssVar.match(/--[a-z-]+/)[0];
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

/* ============ UPLOAD-WIDGET ============ */
function uploadWidgetHTML(category, label) {
  if (!sbClient) {
    return `
      <div class="tickets-empty">
        <div class="icon">⚙️</div>
        Upload noch nicht aktiv – Supabase-Zugangsdaten fehlen im Code
      </div>`;
  }
  return `
    <div class="upload-box" id="upload-${category}">
      <label class="upload-btn" id="btn-${category}" data-label="📎 ${label} hochladen">
        📎 ${label} hochladen
        <input type="file" id="input-${category}" onchange="handleUpload('${category}', this)" />
      </label>
      <div class="upload-hint">PDF, JPG oder PNG · für alle 5 Reisenden sichtbar</div>
    </div>
    <div id="filelist-${category}" style="margin-top:10px;"></div>
  `;
}

async function handleUpload(category, inputEl) {
  const file = inputEl.files[0];
  if (!file) return;
  const btn = document.getElementById('btn-' + category);
  btn.classList.add('uploading');
  btn.firstChild.textContent = '⏳ Wird hochgeladen...';

  const path = `${category}/${Date.now()}_${file.name}`;
  const { error: upErr } = await sbClient.storage.from(BUCKET).upload(path, file);
  if (upErr) {
    alert('Fehler beim Hochladen: ' + upErr.message);
  } else {
    await sbClient.from('trip_files').insert({
      category, filename: file.name, storage_path: path, file_size_kb: Math.round(file.size / 1024)
    });
    await loadFiles(category);
  }
  btn.classList.remove('uploading');
  btn.firstChild.textContent = btn.dataset.label || '📎 Hochladen';
  inputEl.value = '';
}

async function loadFiles(category) {
  if (!sbClient) return;
  const listEl = document.getElementById('filelist-' + category);
  if (!listEl) return;
  const { data, error } = await sbClient.from('trip_files')
    .select('*').eq('category', category).order('created_at', { ascending: false });
  if (error || !data) { listEl.innerHTML = ''; return; }

  listEl.innerHTML = data.map(f => {
    const { data: urlData } = sbClient.storage.from(BUCKET).getPublicUrl(f.storage_path);
    const icon = f.filename.toLowerCase().endsWith('.pdf') ? '📄' : '🖼️';
    return `
      <div class="file-card">
        <span class="ficon">${icon}</span>
        <div class="finfo">
          <div class="fname">${f.filename}</div>
          <div class="fmeta">${f.file_size_kb || 0} KB</div>
        </div>
        <a class="fdownload" href="${urlData.publicUrl}" target="_blank" rel="noopener">Öffnen</a>
        <button class="fdelete" onclick="deleteFile('${f.id}', '${f.storage_path}', '${category}')">✕</button>
      </div>
    `;
  }).join('');
}

async function deleteFile(id, storagePath, category) {
  if (!confirm('Datei wirklich löschen?')) return;
  await sbClient.storage.from(BUCKET).remove([storagePath]);
  await sbClient.from('trip_files').delete().eq('id', id);
  await loadFiles(category);
}

function initUploadWidgets(category) {
  if (sbClient) loadFiles(category);
}

function cardHTML(item, color, withTag) {
  return `
    <div class="card">
      <span class="num" style="background:${color}">${item.num}</span>
      <div class="body">
        <p class="title">${item.title}</p>
        <p class="meta">${item.meta}</p>
        ${withTag && item.tag ? `<span class="tag" style="background:${tagColor(item.tag)}">${item.tag}</span>` : ''}
      </div>
    </div>
  `;
}

function initMap(cityKey) {
  if (maps[cityKey]) { maps[cityKey].invalidateSize(); return; }
  const city = CITIES[cityKey];
  const panel = document.getElementById('panel-' + cityKey);
  const map = L.map('map-' + cityKey, { zoomControl: true }).setView(city.center, city.zoom);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 19
  }).addTo(map);

  const points = panel._points;
  points.forEach(p => {
    const color = p.color.startsWith('var') ? getComputedColor(p.color) : p.color;
    const icon = L.divIcon({
      className: '',
      html: `<div style="position:relative;width:24px;height:24px;border-radius:50% 50% 50% 0;background:${color};transform:rotate(-45deg);border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.4);"><span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(45deg);font-size:11px;font-weight:700;color:white;">${p.num}</span></div>`,
      iconSize: [24, 24], iconAnchor: [12, 24], popupAnchor: [0, -24]
    });
    L.marker([p.lat, p.lng], { icon }).addTo(map)
      .bindPopup(`<b>${p.title}</b><br>${p.meta}`);
  });

  if (points.length) {
    const bounds = L.latLngBounds(points.map(p => [p.lat, p.lng]));
    map.fitBounds(bounds, { padding: [30, 30] });
  }
  maps[cityKey] = map;
}

function buildTravelPanel() {
  const panel = document.createElement('div');
  panel.className = 'city-panel';
  panel.id = 'panel-reise';

  panel.innerHTML = `
    <div class="city-header">
      <span class="emoji">${TRAVEL.emoji}</span>
      <h2>${TRAVEL.label} · ${TRAVEL.dates}</h2>
      <p>Flüge, Tickets & Reisepässe für alle 5 Reisenden</p>
    </div>

    <div class="section" style="margin-top:14px;">
      <div class="section-title">🛫 Flüge & Transfers <span class="count">${TRAVEL.flights.length}</span></div>
      ${TRAVEL.flights.map(f => `
        <div class="card">
          <span class="num" style="background:var(--navy)">${f.num}</span>
          <div class="body">
            <p class="title">${f.title}</p>
            <p class="meta"><b>${f.date}</b> · ${f.meta}</p>
          </div>
        </div>
      `).join('')}
    </div>

    <div class="section">
      <div class="section-title">🎫 Flugtickets</div>
      ${uploadWidgetHTML('flugtickets', 'Flugticket')}
    </div>

    <div class="section">
      <div class="section-title">🛂 Reisepässe</div>
      ${uploadWidgetHTML('reisepaesse', 'Reisepass')}
    </div>
  `;

  content.appendChild(panel);
  initUploadWidgets('flugtickets');
  initUploadWidgets('reisepaesse');
}

/* ============ INIT ============ */
try {
  Object.keys(CITIES).forEach(key => buildPanel(key, CITIES[key]));
  buildTravelPanel();
} catch (e) {
  console.error('Fehler beim Aufbau der Inhalte:', e);
  content.innerHTML = `<div style="padding:20px;color:#C0392B;font-size:13px;">
    ⚠️ Fehler beim Laden der Inhalte: ${e.message}<br><br>
    Bitte Seite neu laden. Falls das Problem bleibt, Screenshot an Claude schicken.
  </div>`;
}

function activateCity(key) {
  document.querySelectorAll('.city-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + key).classList.add('active');
  document.querySelectorAll('#tabs button').forEach(b => b.classList.toggle('active', b.dataset.city === key));
  if (key !== 'reise') setTimeout(() => initMap(key), 50);
}

document.querySelectorAll('#tabs button').forEach(btn => {
  btn.addEventListener('click', () => activateCity(btn.dataset.city));
});

try {
  activateCity('tokio');
} catch (e) {
  console.error('Fehler beim Aktivieren des Tabs:', e);
}
</script>
</body>
</html>
